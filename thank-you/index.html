<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تم استلام طلبك — Viva Media Creative</title>

  <style>
    body{
      margin:0;
      font-family:"Tahoma","Arial",sans-serif;
      background:#07080c;
      color:#eef1f6;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
      padding:20px;
    }

    .box{
      max-width:620px;
      padding:40px 24px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.03);
      backdrop-filter:blur(12px);
    }

    h1{
      color:#f5d07a;
      margin-bottom:14px;
      font-size:28px;
    }

    p{
      color:rgba(238,241,246,.7);
      line-height:2;
      font-size:16px;
      margin:0;
    }

    .btn{
      display:inline-block;
      margin-top:24px;
      padding:12px 22px;
      border-radius:999px;
      background:linear-gradient(135deg,#f5d07a,#b98b2d);
      color:#111;
      font-weight:900;
      text-decoration:none;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>تم استلام طلبك</h1>

    <p>
      شكرًا لتقديمك على Viva Media Creative.<br>
      سنقوم بمراجعة طلبك بعناية، وسيتم التواصل معك في حال كانت خبرتك مناسبة.
    </p>

    <a href="/" class="btn">العودة إلى الرئيسية</a>
  </div>
</body>
</html>
