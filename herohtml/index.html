 
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viva Hero</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Noto Kufi Arabic",sans-serif;
background:#060608;
color:white;
overflow-x:hidden;
}

.hero{
min-height:100vh;
display:grid;
grid-template-columns:1fr 1fr;
align-items:center;
padding:0 8%;
position:relative;
overflow:hidden;
}

.glow1{
position:absolute;
width:500px;
height:500px;
background:#8b5cf6;
border-radius:50%;
filter:blur(180px);
opacity:.18;
top:-150px;
right:-100px;
}

.glow2{
position:absolute;
width:400px;
height:400px;
background:#ff6aa2;
border-radius:50%;
filter:blur(180px);
opacity:.15;
left:-120px;
bottom:-100px;
}

.content{
position:relative;
z-index:2;
}

.smallTitle{
display:inline-block;
padding:10px 20px;
border-radius:999px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
margin-bottom:25px;
color:#f7d47b;
}

h1{
font-size:75px;
line-height:1.1;
margin-bottom:20px;
}

h1 span{
background:linear-gradient(90deg,#f7d47b,#fff);
-webkit-background-clip:text;
color:transparent;
}

.desc{
color:#aaa;
line-height:2;
font-size:18px;
max-width:650px;
margin-bottom:40px;
}

.buttons{
display:flex;
gap:15px;
}

.btn{
padding:18px 32px;
border-radius:999px;
text-decoration:none;
font-weight:700;
}

.primary{
background:#f7d47b;
color:black;
}

.secondary{
border:1px solid rgba(255,255,255,.1);
color:white;
}

.stats{
display:flex;
gap:60px;
margin-top:70px;
}

.stats h2{
font-size:42px;
color:#f7d47b;
}

.stats p{
color:#999;
font-size:14px;
}

.phoneArea{
display:flex;
justify-content:center;
position:relative;
}

.phone{
width:330px;
height:690px;
border-radius:60px;
overflow:hidden;
border:12px solid rgba(255,255,255,.15);
position:relative;
box-shadow:0 40px 120px rgba(0,0,0,.7);
}

.slide{
position:absolute;
inset:0;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
}

.creatorInfo{
position:absolute;
left:20px;
right:20px;
bottom:25px;
padding:20px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
border-radius:30px;
}

.creatorInfo h3{
margin-bottom:10px;
}

.creatorInfo p{
color:#ddd;
font-size:14px;
}

.followers{
margin-top:10px;
color:#f7d47b;
}

.card{
position:absolute;
background:rgba(255,255,255,.07);
backdrop-filter:blur(20px);
padding:16px 22px;
border-radius:25px;
border:1px solid rgba(255,255,255,.08);
}

.card1{
top:80px;
right:-70px;
}

.card2{
left:-80px;
top:180px;
}

.card3{
left:-40px;
bottom:120px;
}

@media(max-width:1000px){

.hero{
grid-template-columns:1fr;
gap:80px;
padding:100px 30px;
}

h1{
font-size:50px;
}

.phone{
width:280px;
height:580px;
}

.stats{
gap:25px;
}

}
.phone::before{
content:"";
position:absolute;
top:16px;
left:50%;
transform:translateX(-50%);
width:90px;
height:8px;
border-radius:999px;
background:rgba(255,255,255,.3);
z-index:20;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
transform:scale(1);
transition:transform 7s linear;
}

.slide.active img{
transform:scale(1.08);
}

.creatorInfo{
position:absolute;
left:20px;
right:20px;
bottom:25px;
padding:22px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(25px);
border-radius:28px;
border:1px solid rgba(255,255,255,.1);
z-index:10;
}

.creatorInfo h3{
font-size:22px;
margin-bottom:8px;
}

.creatorInfo p{
font-size:14px;
color:#ddd;
}

.followers{
margin-top:12px;
font-size:15px;
color:#f7d47b;
font-weight:700;
}

.card{
box-shadow:0 20px 60px rgba(0,0,0,.4);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card1{
top:80px;
right:-60px;
}

.card2{
left:-80px;
top:180px;
}

.card3{
left:-30px;
bottom:120px;
}
</style>

</head>

<body>

<section class="hero">

<div class="glow1"></div>
<div class="glow2"></div>

<div class="content">

<div class="smallTitle">
شبكة المؤثرين العربية
</div>

<h1>

 <span>فرص تعاون مدفوعة</span>

</h1>

 

<div class="buttons">

<a href="#" class="btn primary">
سجل كمؤثر
</a>

<a href="#" class="btn secondary">
لديك علامة تجارية؟
</a>

</div>

<div class="stats">

<div>
<h2>5000+</h2>
<p>مؤثر</p>
</div>

<div>
<h2>300+</h2>
<p>حملة</p>
</div>

<div>
<h2>12</h2>
<p>دولة عربية</p>
</div>

</div>

</div>

<div class="phoneArea">

<div class="card card1">
✨ حملات مدفوعة
</div>

<div class="card card2">
🌍 الخليج والعالم العربي
</div>

<div class="card card3">
🎯 مطابقة ذكية
</div>

<div class="phone">

<div class="slide active">

<img src="images/creator1.webp">

<div class="overlay"></div>

<div class="creatorInfo">

<h3>Sarah Beauty</h3>

<p>
🇸🇦 Saudi Arabia
</p>

<div class="followers">
1.2M Followers
</div>

</div>

</div>

<div class="slide">

<img src="images/creator2.webp">

<div class="overlay"></div>

<div class="creatorInfo">

<h3>Ahmed Tech</h3>

<p>
🇦🇪 UAE
</p>

<div class="followers">
580K Followers
</div>

</div>

</div>

<div class="slide">

<img src="images/creator3.webp">

<div class="overlay"></div>

<div class="creatorInfo">

<h3>Lina Travel</h3>

<p>
🇪🇬 Egypt
</p>

<div class="followers">
890K Followers
</div>

</div>

</div>

</div>

</div>

</section>

<script>

const slides=document.querySelectorAll(".slide");

let current=0;

setInterval(()=>{

slides[current].classList.remove("active");

current++;

if(current>=slides.length){
current=0;
}

slides[current].classList.add("active");

},4000);

</script>

</body>
</html>
